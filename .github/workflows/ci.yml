name: CI — Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Validate file structure ──────────────────────────────────────────────
  validate:
    name: Validate repo structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required=(
            "telem"
            "docker-compose.yml"
            ".env.example"
            ".gitignore"
            "README.md"
            "telegraf/telegraf.conf"
            "audit-writer/Dockerfile"
            "audit-writer/writer.py"
            "audit-writer/schema.sql"
            "lynis-mcp/Dockerfile"
            "lynis-mcp/mcp_server.py"
            "lynis-mcp/entrypoint.sh"
            "grafana/provisioning/datasources/datasources.yml"
            "grafana/provisioning/dashboards/dashboards.yml"
            "grafana/dashboards/linux-telemetry.json"
            "scripts/telem-init.sh"
            "scripts/install-claude-mcp.sh"
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          exit $missing

      - name: Check .env is not committed
        run: |
          if [[ -f ".env" ]]; then
            echo "ERROR: .env file committed to repo — contains secrets!"
            exit 1
          fi
          echo "OK: .env not present"

      - name: Validate docker-compose.yml syntax
        run: |
          docker compose -f docker-compose.yml config --quiet && \
            echo "OK: docker-compose.yml is valid" || \
            (echo "ERROR: docker-compose.yml is invalid"; exit 1)

      - name: Validate JSON dashboards
        run: |
          python3 -c "
          import json, sys
          files = ['grafana/dashboards/linux-telemetry.json']
          for f in files:
              try:
                  json.load(open(f))
                  print(f'OK: {f}')
              except Exception as e:
                  print(f'ERROR: {f} — {e}')
                  sys.exit(1)
          "

      - name: Check telem script is executable
        run: |
          if [[ -x "telem" ]]; then
            echo "OK: telem is executable"
          else
            echo "WARNING: telem is not executable — fixing"
            chmod +x telem
          fi

  # ── Build audit-writer container ─────────────────────────────────────────
  build-audit-writer:
    name: Build audit-writer image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build audit-writer
        uses: docker/build-push-action@v5
        with:
          context: ./audit-writer
          push: false
          tags: emergenit-audit-writer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build lynis-mcp container ─────────────────────────────────────────────
  build-lynis-mcp:
    name: Build lynis-mcp image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build lynis-mcp
        uses: docker/build-push-action@v5
        with:
          context: ./lynis-mcp
          push: false
          tags: emergenit-lynis-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Python lint ───────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install pyflakes

      - name: Run pyflakes
        run: |
          python3 -m pyflakes audit-writer/writer.py
          python3 -m pyflakes lynis-mcp/mcp_server.py
          echo "OK: Python files passed lint"

      - name: Check SQLite schema syntax
        run: |
          python3 -c "
          import sqlite3, tempfile, os
          db = tempfile.mktemp(suffix='.db')
          conn = sqlite3.connect(db)
          schema = open('audit-writer/schema.sql').read()
          conn.executescript(schema)
          conn.close()
          os.unlink(db)
          print('OK: schema.sql is valid SQLite')
          "

  # ── Shell lint ────────────────────────────────────────────────────────────
  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          shellcheck telem
          shellcheck scripts/telem-init.sh
          shellcheck scripts/install-claude-mcp.sh
          shellcheck lynis-mcp/entrypoint.sh
          shellcheck lynis-mcp-wrapper.sh
          echo "OK: Shell scripts passed shellcheck"

  # ── Summary ───────────────────────────────────────────────────────────────
  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs: [validate, build-audit-writer, build-lynis-mcp, lint-python, lint-shell]
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed"
