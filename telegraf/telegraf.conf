# telegraf.conf — ThinkCentre M720s · EmergenIT Linux Telemetry

[agent]
  interval = "5m"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = "thinkcentre-m720s"
  omit_hostname = false

[[outputs.influxdb_v2]]
  urls = ["http://localhost:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "emergenit"
  bucket = "linux-metrics"

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = true

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.diskio]]

[[inputs.net]]
  ignore_protocol_stats = false

[[inputs.system]]

[[inputs.processes]]

[[inputs.swap]]

[[inputs.kernel]]

# ── NTP / Time sync status ────────────────────────────────────────────────
[[inputs.exec]]
  commands = [
    "bash -c \"timedatectl show --property=NTPSynchronized,TimeUSec,NTPService | awk -F= 'BEGIN{s=0;n=0} /NTPSynchronized=yes/{s=1} /NTPService=active/{n=1} END{print s, n}'\""
  ]
  name_override = "ntp_status"
  data_format = "value"
  data_type = "string"
  timeout = "5s"
  [inputs.exec.tags]
    host = "thinkcentre-m720s"

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  timeout = "5s"
  total = false
